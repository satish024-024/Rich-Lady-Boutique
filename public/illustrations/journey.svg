    <path d="M30 60 H90" stroke="#B8904A" stroke-width="1.5" stroke-linecap="round" />
    <!-- Shuttle -->
    <path d="M84 57 L92 60 L84 63 Z" fill="#3B2B24" />
  </g>

  <!-- Step 05: Design & Craft -->
  <g id="step-05" transform="translate(860, 40)">
    <circle cx="60" cy="60" r="55" stroke="#E5D8C9" stroke-width="1" fill="#FFFDF9" />
    <!-- Dress Mannequin Icon -->
    <path d="M60 35 V42" stroke="#3B2B24" stroke-width="1.5" />
    <!-- Mannequin Torso -->
    <path d="M50 42 C54 42 66 42 70 42 C72 50 72 55 68 70 C64 85 66 90 60 90 C54 90 56 85 52 70 C48 55 48 50 50 42 Z" stroke="#3B2B24" stroke-width="1.5" fill="none" stroke-linejoin="round" />
    <!-- Stand -->
    <line x1="60" y1="90" x2="60" y2="105" stroke="#3B2B24" stroke-width="1.5" />
    <path d="M50 105 H70" stroke="#3B2B24" stroke-width="1.5" stroke-linecap="round" />
    <!-- Fabric Drape on Mannequin -->
    <path d="M51 52 C56 58 64 62 67 75" stroke="#B8904A" stroke-width="1.5" fill="none" />
  </g>

  <!-- Step 06: Made For You -->
  <g id="step-06" transform="translate(1060, 40)">
    <circle cx="60" cy="60" r="55" stroke="#E5D8C9" stroke-width="1" fill="#FFFDF9" />
    <!-- Finished Outfit / Elegance Icon -->
    <!-- Hanger -->
    <path d="M54 42 C56 38 64 38 66 42 L78 48 H42 L54 42 Z" stroke="#3B2B24" stroke-width="1" fill="none" />
    <!-- Elegant Anarkali Dress Outline -->
    <path d="M46 48 L48 62 C50 62 50 64 42 76 L32 102 H88 L78 76 C70 64 70 62 72 62 L74 48 H46 Z" stroke="#3B2B24" stroke-width="1.5" fill="none" stroke-linejoin="round" />
    <!-- Zari Details -->
    <path d="M50 56 H70" stroke="#B8904A" stroke-width="1" />
    <path d="M48 62 H72" stroke="#B8904A" stroke-width="1" />
    <path d="M40 82 H80" stroke="#B8904A" stroke-width="1" />
    <path d="M35 96 H85" stroke="#B8904A" stroke-width="1.2" />
  </g>
</svg>
